name: Builder

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "build.yaml config.yaml Dockerfile icon.png logo.png docker-entrypoint.sh"

on:
  workflow_dispatch:
    inputs:
      addon:
        description: 'The name of the addon to build'
        type: string
        required: true
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.2.2

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@v45

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        if : ${{ steps.changed_files.outputs.any_changed == 'true' }}
        id: changed_addons
        run: |
          all_addons=(${{ steps.addons.outputs.addons }})

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ " ${all_addons[@]} " =~ [[:space:]]${{ inputs.addon }}[[:space:]] ]]; then
              changed=("\"${{ inputs.addon }}\"");
            fi
          elif [[ "${{ github.event.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-.+$ ]]; then
            addon=$(echo "${{ github.event.ref }}" | sed "s|.*-||");
            if [[ " ${all_addons[@]} " =~ [[:space:]]${addon}[[:space:]] ]]; then
              changed=("\"$addon\"");
            fi
          else
            declare -a changed_addons;
            for addon in ${{ steps.addons.outputs.addons }}; do
              for monitored_file in ${{ env.MONITORED_FILES }}; do
                for changed_file in ${{ steps.changed_files.outputs.all_changed_files }}; do
                  if [[ "$changed_file" =~ ^$addon/$monitored_file$ ]]; then
                    if [[ ! "${changed_addons[@]}" =~ "$addon" ]]; then
                      changed_addons+=("\"${addon}\",");
                    fi
                  fi
                done
              done
            done
            changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev);
          fi

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "changed=true" >> $GITHUB_OUTPUT;
            echo "addons=[$changed]" >> $GITHUB_OUTPUT;
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
          fi

  build:
    needs: init
    if: needs.init.outputs.changed == 'true'

    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64", "armhf", "armv7", "i386"]
        include:
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
        uses: ./.github/actions/build-addon
        with:
          addon-path: ${{ matrix.addon }}
          arch: ${{ matrix.arch }}
          build-args: ${{ env.BUILD_ARGS }}
          secrets-docker-hub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          secrets-docker-hub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  build_result:
    name: Build result
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build matrix result
        run: |
          result="${{ needs.build.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "Build result: $result — OK"
            exit 0
          else
            echo "Build result: $result — FAILED"
            exit 1
          fi
