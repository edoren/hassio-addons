name: Publish

on:
  workflow_dispatch:
    inputs:
      addon:
        description: 'The name of the addon to publish'
        type: string
        required: true
      version:
        description: 'The new version for the addon'
        type: string
        required: true

env:
  BUILD_ARGS: ""
  MONITORED_FILES: "build.yaml config.yaml Dockerfile icon.png logo.png docker-entrypoint.sh"

jobs:
  build:
    name: Build ${{ matrix.addon }} add-on
    runs-on: ubuntu-latest

    strategy:
      matrix:
        addon: ${{ inputs.addon }}
        arch: ["aarch64", "amd64", "armhf", "armv7", "i386"]
        include:
          - os: ubuntu-latest

    steps:
      - name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
        uses: ./.github/actions/build-addon
        with:
          addon-path: ${{ matrix.addon }}
          arch: ${{ matrix.arch }}
          build-args: ""
          secrets-docker-hub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          secrets-docker-hub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  publish:
    name: Publish changes
    runs-on: ubuntu-latest

    needs: build
    if: needs.build.result == 'success'

    permissions:
      contents: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.2.2

      - name: Bump version in config.yaml
        uses: mikefarah/yq@v4.45.1
        with:
          cmd: yq '.version = "${{ inputs.version }}"' -i ./${{ inputs.addon }}/config.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ".${{ inputs.addon }}/config.yaml"
          git commit -m "chore(${{ inputs.addon }}): Update addon version to ${{ inputs.version }}"

      - name: Push changes
        run: |
          git push origin master

      - name: Create tag
        run: |
          git tag "v${{ inputs.version }}-${{ inputs.addon }}"
          git push origin "v${{ inputs.version }}-${{ inputs.addon }}"
